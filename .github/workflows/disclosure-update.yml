name: Disclosure – UAP Intelligence Feed

on:
  schedule:
    - cron: "0 */2 * * *"   # Every 2 hours
  workflow_dispatch:

jobs:
  update-uap-data:
    name: Generate UAP Trends JSON
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests feedparser

      - name: Create data directory
        run: mkdir -p disclosure/data

      - name: Fetch UAP intelligence
        run: python disclosure/scripts/uap_fetch_trends.py
        continue-on-error: false

      - name: Verify JSON file exists
        run: |
          if [ -f "disclosure/data/uap_trends.json" ]; then
            echo "✅ JSON file created successfully"
            ls -la disclosure/data/
            head -c 500 disclosure/data/uap_trends.json
          else
            echo "❌ JSON file missing, creating fallback"
            cat > disclosure/data/uap_trends.json << 'EOF'
{
  "trends": [],
  "fetched_at": "2024-01-01T00:00:00Z",
  "total_count": 0,
  "topic": "UFO/UAP/NHI - Non-Human Intelligence",
  "insights": {
    "top_activity_niches": [],
    "signal_strength_by_niche": {},
    "source_distribution": {},
    "total_trends": 0,
    "niches_covered": []
  },
  "metadata": {
    "version": "3.0",
    "status": "AWAITING DATA",
    "keywords_monitored": 0
  }
}
EOF
          fi

      - name: Commit and push updates
        run: |
          git config user.name "Disclosure Bot"
          git config user.email "disclosure-bot@users.noreply.github.com"
          git add disclosure/data/uap_trends.json
          git diff --cached --quiet || git commit -m "chore(disclosure): update UAP intelligence feed [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
