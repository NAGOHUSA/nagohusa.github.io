name: 🎌 OTAKU-PULSE Anime Trends

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Install requests
        run: pip install requests
      
      - name: Run anime trends fetch
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python OTAKU/scripts/fetch_anime_trends.py
      
      - name: Commit and push if changed
        run: |
          git config user.name "OTAKU-PULSE Bot"
          git config user.email "bot@nagoh.us"
          git add OTAKU/data/anime_trends.json
          git diff --cached --quiet || git commit -m "🎌 Update anime trends [skip ci]"
          git push
