<script>
// -- Configuration --
const API_BASE = window.ASO_API_BASE !== undefined 
  ? window.ASO_API_BASE 
  : (window.location.hostname === 'nagoh.us' ? '/aso-optimizer' : '');

const State = {
  _key: 'aso_optimizer_state',
  save(data) { try { sessionStorage.setItem(this._key, JSON.stringify(data)); } catch {} },
  load() { try { return JSON.parse(sessionStorage.getItem(this._key) || 'null'); } catch { return null; } },
  clear() { try { sessionStorage.removeItem(this._key); } catch {} },
};

const $ = id => document.getElementById(id);
const show = id => $(id).classList.remove('hidden');
const hide = id => $(id).classList.add('hidden');
function setText(id, text) { $(id).textContent = text; }

async function apiPost(path, body) {
  const res = await fetch(`${API_BASE}${path}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const json = await res.json();
  if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
  return json;
}

// ... Keep your existing Event Listeners for Lookup and Tab Switching ...

async function handleStripeReturn() {
  const params = new URLSearchParams(location.search);
  const sessionId = params.get('session_id');
  const paid = params.get('paid');

  if (!sessionId || paid !== 'true') return;

  history.replaceState({}, '', location.pathname);
  const state = State.load();
  if (!state?.metadata) return;

  show('unlockingSection');
  
  try {
    const data = await apiPost('/api/optimize', {
      metadata: state.metadata,
      targetLocale: state.targetLocale,
      marketName: state.marketName,
      sessionId: sessionId
    });
    populateResults(data, state.metadata);
  } catch (err) {
    alert(`Optimization failed: ${err.message}`);
  } finally {
    hide('unlockingSection');
  }
}

// Initialize
handleStripeReturn();
</script>
</body>
</html>
