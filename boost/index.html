<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nagoh Boost Audit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            .page-break { page-break-before: always; }
            .card { break-inside: avoid; border: 1px solid #eee !important; }
        }
        #pdf-header { display: none; }
        .pdf-mode #pdf-header { display: block; border-bottom: 4px solid #4f46e5; margin-bottom: 2rem; }
    </style>
</head>
<body class="bg-slate-50 font-sans antialiased text-slate-900">

    <div class="max-w-4xl mx-auto py-12 px-4 no-print">
        <h1 class="text-4xl font-bold tracking-tight text-indigo-600 mb-2">Nagoh Boost</h1>
        <p class="text-slate-500 mb-8">Omni-Channel Forensic Audit</p>
        
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-6">
            <textarea id="urlInput" placeholder="Enter one URL per line..." class="w-full h-32 p-4 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none mb-4"></textarea>
            <input type="text" id="brandInput" placeholder="Brand Name (Optional)" class="w-full p-3 border rounded-xl mb-4">
            <button id="runAudit" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 transition">Run Audit</button>
        </div>
    </div>

    <div id="reportContent" class="max-w-4xl mx-auto p-8 bg-white shadow-lg rounded-3xl hidden">
        <div id="pdf-header" class="pb-6">
            <div class="flex justify-between items-end">
                <div>
                    <h2 class="text-3xl font-bold text-indigo-700">Nagoh Boost Audit Report</h2>
                    <p id="pdfDate" class="text-slate-400 font-medium"></p>
                </div>
                <div class="text-right">
                    <p class="text-sm font-bold uppercase tracking-widest text-slate-400">Proprietary Forensic Analysis</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-10">
            <div class="bg-indigo-600 text-white p-8 rounded-3xl text-center flex flex-col justify-center">
                <span class="text-sm uppercase tracking-widest opacity-80">Cohesion Score</span>
                <div id="score" class="text-7xl font-black my-2">0</div>
                <span id="scoreLabel" class="font-bold">Analyzing...</span>
            </div>
            <div class="md:col-span-2">
                <h3 class="text-xl font-bold mb-3 text-slate-800">AI Perception Summary</h3>
                <p id="summary" class="text-slate-600 leading-relaxed text-lg italic"></p>
            </div>
        </div>

        <div class="bg-red-50 border-l-4 border-red-500 p-6 rounded-r-2xl mb-10">
            <h4 class="text-red-700 font-bold uppercase text-xs tracking-widest mb-1">Critical Mismatch Detected</h4>
            <p id="mismatch" class="text-red-900 font-medium"></p>
        </div>

        <h3 class="text-2xl font-bold mb-6 text-slate-800">Platform Breakdown</h3>
        <div id="breakdown" class="space-y-4"></div>

        <div class="mt-12 pt-8 border-t border-slate-100 no-print">
            <button id="downloadPdf" class="bg-slate-900 text-white px-8 py-3 rounded-xl font-bold hover:bg-black">Download PDF Report</button>
        </div>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        let lastData = null;

        $('runAudit').addEventListener('click', async () => {
            const urls = $('urlInput').value.split('\n').filter(u => u.trim());
            const brandName = $('brandInput').value;
            
            $('runAudit').innerText = "Auditing Assets...";
            
            try {
                const res = await fetch('YOUR_WORKER_URL/api/audit', {
                    method: 'POST',
                    body: JSON.stringify({ urls, brandName })
                });
                lastData = await res.json();
                renderReport(lastData);
            } catch (e) { alert("Audit failed. Check console."); }
            
            $('runAudit').innerText = "Run Audit";
        });

        function renderReport(data) {
            $('reportContent').classList.remove('hidden');
            $('score').innerText = data.brand_cohesion_score;
            $('summary').innerText = data.ai_perception_summary;
            $('mismatch').innerText = data.critical_mismatch;
            $('pdfDate').innerText = data.audit_meta.timestamp;

            $('breakdown').innerHTML = data.platform_breakdown.map(p => `
                <div class="card p-6 border border-slate-100 rounded-2xl bg-white shadow-sm flex gap-6">
                    <div class="text-4xl">${p.icon}</div>
                    <div class="flex-1">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <h5 class="font-bold text-lg">${p.channel}</h5>
                                <p class="text-xs text-slate-400 truncate max-w-xs">${p.url}</p>
                            </div>
                            <span class="px-3 py-1 rounded-full text-xs font-bold ${p.health === 'Good' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">${p.health}</span>
                        </div>
                        <p class="text-slate-600 text-sm mb-3"><strong>Finding:</strong> ${p.finding}</p>
                        <p class="text-indigo-600 text-sm font-bold">→ Fix: ${p.fix}</p>
                    </div>
                </div>
            `).join('');
        }

        $('downloadPdf').addEventListener('click', () => {
            const element = $('reportContent');
            document.body.classList.add('pdf-mode');
            
            html2pdf().set({
                margin: 0.5,
                filename: `Nagoh_Audit_${lastData.audit_meta.brand_name_provided}.pdf`,
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 3, useCORS: true },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            }).from(element).save().then(() => {
                document.body.classList.remove('pdf-mode');
            });
        });
    </script>
</body>
</html>
